# Welcome to Jekyll!
# Basic Site Settings
locale                   : "en-US"
site_theme               : "air"
title                    : "Michele Tosi, PhD"
title_separator          : "-"
name                     : &name "Michele Tosi, PhD"
description              : &description "Quantitative UX Researcher — Behavioral Prediction, Surveys analytics, and Applied ML/NLP"
url                      : https://mikeneuroquant.github.io
baseurl                  : ""
repository               : "MikeNeuroquant/MikeNeuroquant"

# Site Author
author:
  avatar           : "1628177270352.png"
  name             : "Michele Tosi, PhD"
  pronouns         : "He/Him"
  bio              : "Quantitative researcher bridging cognitive science, psychometrics, and applied ML. Focused on behavioral prediction, survey science, and experimentation."
  location         : "Verona, Italy"
  uri              :
  email            : "michele.tosi1995@gmail.com"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=cat8crYAAAAJ&hl=en"
  inspire-hep      :
  impactstory      :
  orcid            :
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     :
